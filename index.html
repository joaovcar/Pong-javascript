<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Pong</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="menu" class="screen">
    <h1>PONG</h1>
    <button id="btn-ai">Jogar contra a IA</button>
    <button id="btn-pvp">2 Jogadores</button>
    <p class="hint">P1: W / S &nbsp;&nbsp; P2: ↑ / ↓</p>
  </div>

  <div id="game" class="screen hidden">
    <canvas id="canvas" width="800" height="500"></canvas>
    <button id="btn-back">Voltar ao menu</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
